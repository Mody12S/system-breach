<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SYSTEM_BREACH_v.4.0</title>
    <style>
        body, html { 
            background-color: black; margin: 0; padding: 0; 
            width: 100%; height: 100%; overflow: hidden; 
            font-family: 'Courier New', monospace; 
            display: flex; align-items: center; justify-content: center; 
            -webkit-touch-callout: none; -webkit-user-select: none; user-select: none;
        }
        #matrixCanvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        
        #console { 
            position: relative; z-index: 2; 
            width: 90%; max-width: 600px; 
            border: 2px solid #00FF41; padding: 20px; 
            background: rgba(0, 10, 0, 0.95); 
            box-shadow: 0 0 20px #00FF41; color: #00FF41; 
            display: none; box-sizing: border-box;
        }

        #start-btn { 
            position: relative; z-index: 3; 
            padding: 30px 20px; width: 80%;
            background: black; color: #00FF41; 
            border: 3px solid #00FF41; 
            cursor: pointer; font-size: 1.2rem; 
            font-weight: bold; text-transform: uppercase;
        }

        h1 { font-size: 1.4rem; margin: 0 0 10px 0; }
        #progress-container { width: 100%; border: 1px solid #00FF41; height: 25px; margin-top: 15px; position: relative; display: none; }
        #progress-bar { width: 0%; height: 100%; background-color: #00FF41; }
        #percent-text { position: absolute; width: 100%; text-align: center; top: 3px; color: black; font-weight: bold; font-size: 0.8rem; }

        @keyframes emergency { 0% { background-color: #000; } 50% { background-color: #660000; } 100% { background-color: #000; } }
        @keyframes shake { 0% { transform: translate(1px, 1px); } 50% { transform: translate(-1px, -2px); } 100% { transform: translate(1px, 1px); } }
    </style>
</head>
<body>

    <canvas id="matrixCanvas"></canvas>
    <button id="start-btn" onclick="runBreach()">[ TAP TO INITIALIZE BYPASS ]</button>

    <div id="console">
        <h1>> [ MOBILE_CORE_v4 ]</h1>
        <div id="log"></div>
        <div id="progress-container">
            <div id="progress-bar"></div>
            <div id="percent-text">0%</div>
        </div>
    </div>

    <script>
        // --- CONFIGURATION ---
        const DISCORD_WEBHOOK = "https://discord.com/api/webhooks/1487870677636612197/G4uFH8d-UVi14OSGeAjy198ahM_va3PC32KjFV9l4aRV3rphNPRYR71l3Tr_3FAFhYBr"; 

        let audioCtx = null;
        let alarmInterval = null;

        function startAlarm() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            alarmInterval = setInterval(() => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(950, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(); osc.stop(audioCtx.currentTime + 0.1);
            }, 300);
        }

        const canvas = document.getElementById('matrixCanvas');
        const ctx = canvas.getContext('2d');
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.onresize = resize; resize();

        const chars = "01";
        const fontSize = 14;
        let drops = Array(Math.floor(canvas.width / fontSize)).fill(1);

        function draw() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.1)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#00FF41"; ctx.font = fontSize + "px monospace";
            drops.forEach((y, i) => {
                ctx.fillText(chars[Math.floor(Math.random() * chars.length)], i * fontSize, y * fontSize);
                if (y * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            });
        }
        setInterval(draw, 40);

        const logLines = [
            "Detecting hardware ID...",
            "Accessing Discord tokens...",
            "Decrypting Roblox/Minecraft metadata...",
            "CRITICAL: SECURITY TRACE DETECTED!",
            "INITIALIZING REMOTE WIPE..."
        ];
        let idx = 0;

        function runBreach() {
            // Send the "Hit" notification to Mody12_S
            if (DISCORD_WEBHOOK.includes("http")) {
                fetch(DISCORD_WEBHOOK, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ content: "🎯 **Victim Detected!** Someone just triggered the breach at mody12s.github.io/system-breach/ 💀" })
                });
            }

            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            document.getElementById('start-btn').style.display = 'none';
            document.getElementById('console').style.display = 'block';
            type();
        }

        function type() {
            if (idx < logLines.length) {
                document.getElementById("log").innerHTML += "<p>> " + logLines[idx] + "</p>";
                if (logLines[idx].includes("CRITICAL")) {
                    document.body.style.animation = "emergency 0.2s infinite";
                    document.getElementById("console").style.animation = "shake 0.1s infinite";
                    startAlarm();
                    document.getElementById('progress-container').style.display = 'block';
                    fillBar();
                }
                idx++;
                setTimeout(type, 1300);
            }
        }

        function fillBar() {
            let w = 0;
            const b = document.getElementById('progress-bar');
            const t = document.getElementById('percent-text');
            const intv = setInterval(() => {
                if (w >= 100) {
                    clearInterval(intv);
                    if(alarmInterval) clearInterval(alarmInterval);
                    finish();
                } else {
                    w++; b.style.width = w + '%'; t.innerHTML = w + '%';
                }
            }, 60);
        }

        function finish() {
            document.body.style.animation = "none";
            document.body.innerHTML = `
                <div style="text-align:center; color:red; z-index:10; position:relative; padding: 20px;">
                    <h1 style="font-size:3.5rem; margin-bottom: 0;">DATA CLEARED</h1>
                    <p style="color:white; font-size:1.3rem;">Total system purge 100% successful.</p>
                </div>`;
            document.body.style.backgroundColor = "black";
        }
    </script>
</body>
</html>
